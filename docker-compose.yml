services:
  app:
    build: .
    container_name: multi-shop-link
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./public/web-dist:/app/public/web-dist
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - COOKIE_SECURE=false
    restart: unless-stopped