services:
  multi-shop-link:
    build: .
    container_name: multi-shop-link
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
