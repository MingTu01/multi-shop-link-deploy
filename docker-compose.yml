services:
  app:
    build: .
    container_name: multi-shop-link
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./public/web-dist:/app/public/web-dist
    environment:
      - NODE_ENV=production
      - PORT=3001
      # 生产环境必须设置: 你的域名(含协议)，多个用逗号分隔
      # 例: CORS_ORIGIN=https://your-domain.com
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    restart: unless-stopped
